<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brat Generator Pro Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 1. Memuat Font Kustom */
        @font-face {
            font-family: 'BratFont';
            src: url('arialnarrow.ttf') format('truetype');
            font-display: swap;
        }
        
        @font-face {
            font-family: 'AppleEmoji';
            src: url('Apple Color Emoji.ttf') format('truetype');
            font-display: swap;
        }

        /* 2. Reset & Anti-Highlight System */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
        }

        /* 3. Dark/Glowing Modern Aesthetic */
        body {
            background-color: #0d0e12;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(34, 197, 94, 0.08) 0%, transparent 60%),
                radial-gradient(circle at 50% 100%, rgba(34, 197, 94, 0.05) 0%, transparent 50%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .app-container {
            background: rgba(22, 23, 28, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            width: 100%;
            max-width: 440px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            to { transform: translateY(0); opacity: 1; }
        }

        /* 4. Header Premium */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 2;
        }

        .header h1 {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            color: #a1a1aa;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }

        .icon-btn:active { transform: scale(0.95); }

        /* 5. Content Area */
        .content { padding: 24px; position: relative; z-index: 2; }

        /* Preview Bingkai 3D */
        .preview-wrapper {
            position: relative;
            margin-bottom: 24px;
            border-radius: 16px;
            padding: 4px;
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .preview-frame {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #111;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .preview-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .preview-placeholder {
            color: #52525b;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            animation: pulseText 3s infinite ease-in-out;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* 6. Input Area Smooth */
        textarea {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            resize: none;
            height: 90px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: text;
            margin-bottom: 24px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        textarea:focus {
            border-color: #22c55e;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15), inset 0 2px 4px rgba(0,0,0,0.2);
        }

        textarea::placeholder { color: #52525b; }

        /* 7. 3D Buttons Bouncy */
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #27272a 0%, #18181b 100%);
            color: white;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 0 #09090b, 0 10px 20px rgba(0,0,0,0.4);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-primary:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #09090b, 0 2px 5px rgba(0,0,0,0.4);
        }

        .btn-download {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: #000;
            border: none;
            box-shadow: 0 6px 0 #14532d, 0 10px 20px rgba(34, 197, 94, 0.2);
            margin-top: 20px;
            display: none; 
            animation: slideUpFade 0.4s ease forwards;
        }

        .btn-download:active {
            box-shadow: 0 0 0 #14532d, 0 2px 5px rgba(34, 197, 94, 0.2);
        }

        /* 8. Settings Panel Glassmorphism */
        .settings-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 18, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        .settings-panel.active { transform: translateY(0); }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-weight: 500;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            background: transparent;
            transition: transform 0.2s;
        }

        input[type="color"]:hover { transform: scale(1.1); }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
        }

        /* 9. Glowing Toast */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(150px) scale(0.9);
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            backdrop-filter: blur(10px);
            padding: 14px 28px;
            border-radius: 100px;
            font-size: 0.95rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 50;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.2);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0) scale(1);
            opacity: 1;
        }

        #renderCanvas { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="app-container">
        <div class="header">
            <h1>Brat Studio</h1>
            <button class="icon-btn" id="btnSettings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </div>

        <div class="content">
            <div class="preview-wrapper" id="previewWrapper">
                <div class="preview-frame" id="previewFrame">
                    <div class="preview-placeholder" id="placeholderText">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <span>Area Visual</span>
                    </div>
                    <img id="previewImg" src="" alt="Brat Preview">
                </div>
            </div>

            <textarea id="textInput" placeholder="Ketik kata-katamu di sini (tambah emoji juga bisa)..." spellcheck="false"></textarea>

            <button class="btn-primary" id="btnGenerate">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path>
                </svg>
                Render Stiker
            </button>

            <button class="btn-primary btn-download" id="btnDownload">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Simpan ke Galeri
            </button>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <div class="header" style="padding: 0 0 24px 0; border-bottom: 1px solid rgba(255,255,255,0.05); background: transparent;">
                <h2 style="font-size: 1.15rem; font-weight: 700;">Konfigurasi</h2>
                <button class="icon-btn" id="btnCloseSettings">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="setting-item" style="margin-top: 16px;">
                <span>Warna Latar Belakang</span>
                <input type="color" id="bgColor" value="#ffffff">
            </div>
            <div class="setting-item">
                <span>Warna Tipografi</span>
                <input type="color" id="textColor" value="#000000">
            </div>
        </div>

        <div class="toast" id="toastMsg"></div>
        <canvas id="renderCanvas" width="1000" height="1000"></canvas>
    </div>

    <script>
        const elements = {
            btnSettings: document.getElementById('btnSettings'),
            btnCloseSettings: document.getElementById('btnCloseSettings'),
            settingsPanel: document.getElementById('settingsPanel'),
            btnGenerate: document.getElementById('btnGenerate'),
            btnDownload: document.getElementById('btnDownload'),
            textInput: document.getElementById('textInput'),
            bgColor: document.getElementById('bgColor'),
            textColor: document.getElementById('textColor'),
            previewImg: document.getElementById('previewImg'),
            placeholderText: document.getElementById('placeholderText'),
            previewWrapper: document.getElementById('previewWrapper'),
            canvas: document.getElementById('renderCanvas'),
            toastMsg: document.getElementById('toastMsg')
        };
        
        const ctx = elements.canvas.getContext('2d');

        function showToast(message) {
            elements.toastMsg.innerText = message;
            elements.toastMsg.classList.add('show');
            setTimeout(() => elements.toastMsg.classList.remove('show'), 3000);
        }

        elements.btnSettings.addEventListener('click', () => elements.settingsPanel.classList.add('active'));
        elements.btnCloseSettings.addEventListener('click', () => elements.settingsPanel.classList.remove('active'));

        // Algoritma Dynamic Auto-Scaling (Support Emoji iPhone)
        function drawDynamicBratText(context, text, canvasWidth, canvasHeight) {
            let minFontSize = 30;
            let maxFontSize = 450; 
            let fontSize = maxFontSize;
            let lineHeight = 1.05; 
            let padding = 100;
            let maxWidth = canvasWidth - (padding * 2);
            let maxHeight = canvasHeight - (padding * 2);
            let lines = [];
            let words = text.split(' ');

            while (fontSize >= minFontSize) {
                // Prioritaskan BratFont, lalu AppleEmoji khusus untuk emoji, baru fallback OS
                context.font = `${fontSize}px 'BratFont', 'AppleEmoji', 'Apple Color Emoji', sans-serif`;
                lines = [];
                let currentLine = words[0];
                let wordExceedsWidth = false;

                for (let word of words) {
                    if (context.measureText(word).width > maxWidth) {
                        wordExceedsWidth = true;
                        break;
                    }
                }

                for (let i = 1; i < words.length; i++) {
                    let testLine = currentLine + ' ' + words[i];
                    let metrics = context.measureText(testLine);
                    if (metrics.width > maxWidth) {
                        lines.push(currentLine);
                        currentLine = words[i];
                    } else {
                        currentLine = testLine;
                    }
                }
                lines.push(currentLine);

                let totalHeight = lines.length * (fontSize * lineHeight);

                if (totalHeight <= maxHeight && !wordExceedsWidth) break;
                fontSize -= 5; 
            }

            let widestLineWidth = 0;
            for (let line of lines) {
                let w = context.measureText(line).width;
                if (w > widestLineWidth) widestLineWidth = w;
            }

            let blurAmount = Math.max(1.5, fontSize * 0.015);
            context.filter = `blur(${blurAmount}px)`;
            context.textBaseline = 'middle';
            context.textAlign = 'left';
            
            let totalHeight = lines.length * (fontSize * lineHeight);
            let startY = (canvasHeight / 2) - (totalHeight / 2) + (fontSize / 2);
            let startX = (canvasWidth / 2) - (widestLineWidth / 2);

            for (let i = 0; i < lines.length; i++) {
                context.fillText(lines[i], startX, startY + (i * (fontSize * lineHeight)));
            }
            context.filter = 'none'; 
        }

        elements.btnGenerate.addEventListener('click', async () => {
            const rawText = elements.textInput.value.trim();

            if (!rawText) {
                showToast('Isi kata-katanya dulu, ya!');
                // Animasi error getar (shake)
                elements.textInput.style.transform = 'translateX(-10px)';
                setTimeout(() => elements.textInput.style.transform = 'translateX(10px)', 100);
                setTimeout(() => elements.textInput.style.transform = 'translateX(-10px)', 200);
                setTimeout(() => elements.textInput.style.transform = 'translateX(0)', 300);
                return;
            }

            // Memaksa browser menunggu font kustom siap sebelum render
            await document.fonts.ready;

            // Animasi loading pada tombol
            const originalBtnHtml = elements.btnGenerate.innerHTML;
            elements.btnGenerate.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg> Memproses...`;
            
            // Memberi jeda kecil agar UI sempat update sebelum proses render yang berat
            setTimeout(() => {
                const width = elements.canvas.width;
                const height = elements.canvas.height;

                ctx.fillStyle = elements.bgColor.value;
                ctx.fillRect(0, 0, width, height);

                ctx.fillStyle = elements.textColor.value;
                drawDynamicBratText(ctx, rawText, width, height);

                const dataUrl = elements.canvas.toDataURL('image/png');
                
                // Menetapkan sumber gambar yang sama persis
                elements.previewImg.src = dataUrl;
                
                elements.placeholderText.style.display = 'none';
                elements.previewImg.style.display = 'block';
                elements.btnDownload.style.display = 'flex'; 

                // Kembalikan tombol ke semula
                elements.btnGenerate.innerHTML = originalBtnHtml;
                
                // Sedikit animasi pantulan saat gambar muncul
                elements.previewWrapper.style.transform = 'scale(1.03)';
                setTimeout(() => elements.previewWrapper.style.transform = 'scale(1)', 200);

            }, 50);
        });

        // FIX: Download mengambil data langsung dari previewImg yang sudah berhasil di-render
        elements.btnDownload.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `Brat_HD_${new Date().getTime()}.png`;
            link.href = elements.previewImg.src; // Menggunakan source yang sudah fix ada di layar
            link.click();
        });

        // Tambahan CSS untuk animasi spin loading
        const style = document.createElement('style');
        style.innerHTML = `@keyframes spin { 100% { transform: rotate(360deg); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
