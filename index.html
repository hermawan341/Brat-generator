<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brat Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        @font-face {
            font-family: 'BratFont';
            src: url('arialnarrow.ttf') format('truetype');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #0f0f0f; color: #ffffff; display: flex; justify-content: center;
            align-items: center; min-height: 100vh; padding: 20px;
        }

        .app-container {
            background: #18181b; width: 100%; max-width: 420px; border-radius: 16px;
            border: 1px solid #27272a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden;
        }

        .header { padding: 18px 24px; border-bottom: 1px solid #27272a; text-align: center; }
        .header h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; color: #fff; }

        .content { padding: 24px; display: flex; flex-direction: column; gap: 16px; }

        /* Preview Frame & Animasi Halus */
        .preview-frame {
            width: 100%; aspect-ratio: 1 / 1; background: #ffffff; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #3f3f46; position: relative;
        }

        .preview-frame img {
            width: 100%; height: 100%; object-fit: cover; display: none; opacity: 0;
            transform: scale(0.96); transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .preview-frame img.reveal-anim { display: block; opacity: 1; transform: scale(1); }

        textarea {
            width: 100%; background: #09090b; color: #fff; border: 1px solid #3f3f46; border-radius: 10px;
            padding: 16px; height: 90px; resize: none; font-size: 1rem; font-weight: 600; outline: none; user-select: text; transition: 0.3s;
        }
        textarea:focus { border-color: #10b981; }

        .settings-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: #09090b;
            padding: 14px; border-radius: 12px; border: 1px solid #27272a;
        }

        .setting-box { display: flex; flex-direction: column; gap: 8px; justify-content: center; }
        .setting-label { font-size: 0.75rem; color: #a1a1aa; font-weight: 600; }

        .color-group { display: flex; gap: 8px; }
        .color-wrap { position: relative; width: 30px; height: 30px; border-radius: 50%; overflow: hidden; border: 2px solid #52525b; cursor: pointer; }
        .color-wrap input { position: absolute; top: -10px; left: -10px; width: 50px; height: 50px; cursor: pointer; border: none; }

        .toggle-switch { position: relative; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #3f3f46; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(20px); }

        .action-row { display: flex; gap: 10px; }
        .btn {
            padding: 14px; border-radius: 10px; font-weight: 800; font-size: 1rem;
            border: none; cursor: pointer; transition: 0.2s; flex: 1; text-align: center;
        }
        .btn:active { transform: scale(0.96); }
        .btn-main { background: #fff; color: #000; }
        .btn-download { background: #10b981; color: #fff; display: none; }

        .footer { text-align: center; padding: 0 0 20px 0; display: flex; flex-direction: column; gap: 2px; }
        .footer .name { font-size: 0.85rem; font-weight: 800; color: #71717a; }
        .footer .badge { font-size: 0.6rem; color: #52525b; text-transform: uppercase; font-weight: 700; }

        /* KOTAK RENDER ABSOLUT FIX */
        #render-box {
            position: absolute; top: -9999px; left: -9999px;
            width: 800px; height: 800px; background-color: #ffffff;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        /* Area aman teks: Max 720px supaya ada jarak margin 40px dari tepi layar */
        #text-container {
            display: flex; align-items: center; justify-content: flex-start;
            max-width: 720px; max-height: 720px;
        }

        #render-text {
            font-family: 'BratFont', sans-serif; color: #000000;
            text-align: left; line-height: 1.05;
            word-wrap: break-word; white-space: pre-wrap;
        }

        /* Ukuran emoji yang sejajar sama teks */
        .apple-emoji {
            width: 1em; height: 1em; vertical-align: -0.1em;
            display: inline-block; margin: 0 0.05em;
        }

        /* WATERMARK MATI DI POJOK (Warna Abu-Abu, Sangat Kecil) */
        .watermark-text {
            position: absolute; bottom: 20px; left: 25px;
            font-family: 'Inter', sans-serif; font-size: 16px; 
            color: rgba(0, 0, 0, 0.3); font-weight: 700; z-index: 10; display: none;
        }

        /* Custom Toast Notif */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 50px);
            background: #10b981; color: #fff; padding: 12px 24px; border-radius: 30px;
            font-size: 0.9rem; font-weight: 600; opacity: 0; z-index: 100; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); pointer-events: none;
        }
        .toast.show { transform: translate(-50%, 0); opacity: 1; }
        .toast-error { background: #ef4444; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="app-container">
        <div class="header"><h1>BRAT STUDIO</h1></div>

        <div class="content">
            <div class="preview-frame" id="previewFrame"><img id="previewImg" src="" alt="Preview"></div>
            <textarea id="textInput" placeholder="Ketik kata atau emoji..." spellcheck="false"></textarea>

            <div class="settings-grid">
                <div class="setting-box">
                    <span class="setting-label">Watermark</span>
                    <label class="toggle-switch"><input type="checkbox" id="watermarkToggle"><span class="slider"></span></label>
                </div>
                <div class="setting-box">
                    <span class="setting-label">Warna Menu</span>
                    <div class="color-group">
                        <div class="color-wrap"><input type="color" id="bgColor" value="#ffffff"></div>
                        <div class="color-wrap" style="border-color: #52525b;"><input type="color" id="textColor" value="#000000"></div>
                    </div>
                </div>
            </div>

            <div class="action-row">
                <button class="btn btn-main" id="btnGenerate">Buat Stiker</button>
                <button class="btn btn-download" id="btnDownload">Simpan ke Galeri</button>
            </div>
        </div>

        <div class="footer">
            <span class="name">By Hermawan</span><span class="badge">non api</span>
        </div>

        <div id="render-box">
            <div id="text-container">
                <div id="render-text"></div>
            </div>
            <div class="watermark-text" id="renderWatermark">by Hermawan</div>
        </div>

        <div class="toast" id="toastMsg"></div>
    </div>

    <script>
        const btnGenerate = document.getElementById('btnGenerate'), btnDownload = document.getElementById('btnDownload');
        const textInput = document.getElementById('textInput'), previewImg = document.getElementById('previewImg');
        const renderBox = document.getElementById('render-box'), renderText = document.getElementById('render-text'), renderWatermark = document.getElementById('renderWatermark');
        const watermarkToggle = document.getElementById('watermarkToggle'), bgColorInput = document.getElementById('bgColor'), textColorInput = document.getElementById('textColor');
        
        let finalImageURL = ""; 

        const toastMsg = document.getElementById('toastMsg');
        function showToast(msg, isError = false) {
            toastMsg.innerText = msg;
            toastMsg.className = isError ? 'toast toast-error show' : 'toast show';
            setTimeout(() => toastMsg.classList.remove('show'), 3000);
        }

        // Live ganti warna frame doang pas belum di generate
        bgColorInput.addEventListener('input', (e) => document.getElementById('previewFrame').style.backgroundColor = e.target.value);

        // Parser Emoji
        function injectAppleEmojis(text) {
            const segmenter = new Intl.Segmenter('en', { granularity: 'grapheme' });
            let resultHTML = '';
            for (let {segment} of segmenter.segment(text)) {
                if (/\p{Emoji}/u.test(segment) && !/^[0-9#*]+$/.test(segment)) {
                    let hexCodes = Array.from(segment).map(char => char.codePointAt(0).toString(16)).filter(code => code !== 'fe0f').join('-');
                    resultHTML += `<img src="https://cdn.jsdelivr.net/npm/emoji-datasource-apple/img/apple/64/${hexCodes}.png" class="apple-emoji" crossorigin="anonymous">`;
                } else {
                    resultHTML += segment.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                }
            }
            return resultHTML;
        }

        // FUNGSI WAJIB: TUNGGU EMOJI LOAD BIAR GAK KEPOTONG
        async function waitForImagesToLoad() {
            const images = renderText.getElementsByTagName('img');
            const promises = Array.from(images).map(img => {
                return new Promise(resolve => {
                    if (img.complete) resolve();
                    else { img.onload = resolve; img.onerror = resolve; }
                });
            });
            await Promise.all(promises);
        }

        btnGenerate.addEventListener('click', async () => {
            const rawText = textInput.value.trim();
            if (!rawText) return showToast("Ketik teksnya dulu dong!", true);

            previewImg.classList.remove('reveal-anim');
            btnDownload.style.display = 'none';
            btnGenerate.innerText = "Memproses...";

            // Terapkan Warna & Watermark
            renderBox.style.backgroundColor = bgColorInput.value;
            renderText.style.color = textColorInput.value;
            
            // Logika warna watermark: abu-abu kecil
            renderWatermark.style.color = textColorInput.value;
            renderWatermark.style.opacity = "0.3";
            renderWatermark.style.display = watermarkToggle.checked ? 'block' : 'none';

            // Masukkan teks ke kotak render
            renderText.innerHTML = injectAppleEmojis(rawText);

            // Wajib ditunggu biar perhitungan font akurat 100%
            await waitForImagesToLoad();

            // LOGIKA UKURAN FONT FIX
            // 250px maksimal biar kalau 1 huruf/kata doang gak sampai nabrak banget ke pinggir.
            let fontSize = 250; 
            renderText.style.fontSize = fontSize + 'px';
            
            // Batas maksimal kotak tempat teks ngembang (800 - 80px margin)
            const maxBound = 720; 

            // Algoritma mengecilkan teks secara presisi
            while ((renderText.offsetHeight > maxBound || renderText.offsetWidth > maxBound) && fontSize > 10) {
                fontSize -= 2; // Kurangi tipis-tipis biar mepetnya sempurna
                renderText.style.fontSize = fontSize + 'px';
            }

            // Blur dinamis 
            let dynamicBlur = 0.5 + (rawText.length * 0.015);
            if (fontSize > 100) dynamicBlur = 1.0; // Teks pendek sedikit blur
            if (dynamicBlur > 2.0) dynamicBlur = 2.0; 
            renderText.style.filter = `blur(${dynamicBlur}px)`;

            await new Promise(r => requestAnimationFrame(r));

            try {
                const canvas = await html2canvas(renderBox, {
                    scale: 1, useCORS: true, backgroundColor: null, logging: false
                });

                finalImageURL = canvas.toDataURL('image/png', 1.0);
                previewImg.src = finalImageURL;
                
                setTimeout(() => {
                    previewImg.style.display = "block";
                    previewImg.classList.add('reveal-anim');
                }, 10);
                
                btnDownload.style.display = 'block';
            } catch (err) { 
                showToast("Gagal! Coba lagi.", true); 
            } finally { 
                btnGenerate.innerText = "Buat Stiker"; 
            }
        });

        textInput.addEventListener('input', () => {
            if(btnDownload.style.display === 'block') { btnGenerate.style.display = 'block'; btnDownload.style.display = 'none'; }
        });

        btnDownload.addEventListener('click', () => {
            if (!finalImageURL) return;
            const link = document.createElement('a');
            link.download = `Brat_${Date.now()}.png`; link.href = finalImageURL; link.click();
            showToast("Berhasil di-download!");
        });
    </script>
</body>
</html>
